name: Daily Stats Refresh

on:
  schedule:
    # Jalan setiap jam 06:00 dan 18:00 UTC (13:00 dan 01:00 WIB)
    - cron: '0 6,18 * * *'
  workflow_dispatch: # Bisa di-trigger manual dari GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_CLIENT_ID_2: ${{ secrets.SPOTIFY_CLIENT_ID_2 }}
          SPOTIFY_CLIENT_SECRET_2: ${{ secrets.SPOTIFY_CLIENT_SECRET_2 }}
          SPOTIFY_CLIENT_ID_3: ${{ secrets.SPOTIFY_CLIENT_ID_3 }}
          SPOTIFY_CLIENT_SECRET_3: ${{ secrets.SPOTIFY_CLIENT_SECRET_3 }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SCRAPE_COUNTRIES: ${{ secrets.SCRAPE_COUNTRIES }}
          TOP_ARTISTS_LIMIT: ${{ secrets.TOP_ARTISTS_LIMIT }}
          TOP_TRACKS_LIMIT: ${{ secrets.TOP_TRACKS_LIMIT }}

      - name: Start Next.js Server
        run: |
          npm start &
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -s http://localhost:3000 > /dev/null 2>&1; then
              echo "Server is ready!"
              break
            fi
            sleep 2
          done
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_CLIENT_ID_2: ${{ secrets.SPOTIFY_CLIENT_ID_2 }}
          SPOTIFY_CLIENT_SECRET_2: ${{ secrets.SPOTIFY_CLIENT_SECRET_2 }}
          SPOTIFY_CLIENT_ID_3: ${{ secrets.SPOTIFY_CLIENT_ID_3 }}
          SPOTIFY_CLIENT_SECRET_3: ${{ secrets.SPOTIFY_CLIENT_SECRET_3 }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SCRAPE_COUNTRIES: ${{ secrets.SCRAPE_COUNTRIES }}
          TOP_ARTISTS_LIMIT: ${{ secrets.TOP_ARTISTS_LIMIT }}
          TOP_TRACKS_LIMIT: ${{ secrets.TOP_TRACKS_LIMIT }}

      - name: Run Data Refresh
        run: |
          echo "🔄 Starting data refresh..."
          curl --fail-with-body --max-time 3600 \
            "http://localhost:3000/api/cron/refresh?secret=${{ secrets.ADMIN_SECRET }}"
          echo ""
          echo "✅ Data refresh completed!"

      - name: Log cron execution
        if: always()
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M UTC') - Cron refresh completed (status: ${{ job.status }})" >> cron-log.txt

      - name: Commit cron log
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cron-log.txt
          git diff --cached --quiet || git commit -m "🔄 Cron refresh $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
